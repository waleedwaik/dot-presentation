<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>dot-portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;1,300&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #080808;
      --surface: #111111;
      --border: rgba(255,255,255,0.07);
      --border-hover: rgba(200,169,110,0.4);
      --text: #f0ede6;
      --muted: rgba(240,237,230,0.38);
      --gold: #c8a96e;
      --gold-dim: rgba(200,169,110,0.12);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.028;
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
      gap: 0;
    }

    /* wordmark */
    .wordmark {
      font-family: 'Cormorant', serif;
      font-weight: 300;
      font-size: clamp(2.8rem, 7vw, 5rem);
      letter-spacing: -0.01em;
      line-height: 1;
      color: var(--text);
      user-select: none;
    }

    .wordmark .dot {
      color: var(--gold);
      display: inline-block;
      animation: pulse-dot 3s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.55; }
    }

    .subtitle {
      margin-top: 0.75rem;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* divider */
    .divider {
      width: 1px;
      height: 56px;
      background: linear-gradient(to bottom, transparent, var(--border), transparent);
      margin: 3rem 0;
    }

    /* card */
    .card {
      display: block;
      text-decoration: none;
      width: 100%;
      max-width: 460px;
      padding: 2rem 2.25rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--surface);
      position: relative;
      overflow: hidden;
      transition: border-color 0.35s ease, transform 0.35s ease;
      cursor: pointer;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 0% 0%, var(--gold-dim) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .card:hover {
      border-color: var(--border-hover);
      transform: translateY(-2px);
    }

    .card:hover::before {
      opacity: 1;
    }

    .card-tag {
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.85rem;
    }

    .card-title {
      font-family: 'Cormorant', serif;
      font-weight: 400;
      font-size: 1.9rem;
      line-height: 1.1;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .card-desc {
      margin-top: 0.65rem;
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.6;
      font-weight: 400;
    }

    .card-arrow {
      position: absolute;
      right: 2.25rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.1rem;
      color: var(--muted);
      transition: color 0.3s ease, transform 0.3s ease;
    }

    .card:hover .card-arrow {
      color: var(--gold);
      transform: translateY(-50%) translateX(4px);
    }

    /* footer */
    .footer {
      position: fixed;
      bottom: 1.75rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.62rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(240,237,230,0.18);
      white-space: nowrap;
    }

    /* entrance animation */
    .wordmark, .subtitle, .divider, .card {
      animation: fade-up 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    .subtitle  { animation-delay: 0.08s; }
    .divider   { animation-delay: 0.16s; }
    .card      { animation-delay: 0.24s; }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <main class="page">
    <h1 class="wordmark">dot<span class="dot">.</span>portfolio</h1>
    <p class="subtitle">Client Presentations</p>

    <div class="divider"></div>

    <a class="card" href="/telco">
      <div class="card-tag">Pitch Deck</div>
      <div class="card-title">Telco</div>
      <div class="card-desc">Premium Merchants Portfolio &mdash; A Curated Selection of Top Players</div>
      <span class="card-arrow">→</span>
    </a>
  </main>

  <footer class="footer">dot-portfolio.com</footer>
</body>
</html>
