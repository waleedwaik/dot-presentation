<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Telco Pitch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      background: #080808;
      font-family: 'Syne', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── gate ── */
    #gate {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #080808;
      transition: opacity 0.4s ease;
    }

    #gate.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .gate-box {
      width: 100%;
      max-width: 360px;
      padding: 0 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      animation: fade-up 0.7s cubic-bezier(0.16,1,0.3,1) both;
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .gate-logo {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(240,237,230,0.3);
      margin-bottom: 2.5rem;
    }

    .gate-logo span { color: #c8a96e; }

    .gate-label {
      align-self: flex-start;
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(240,237,230,0.35);
      margin-bottom: 0.55rem;
    }

    .gate-input {
      width: 100%;
      background: #111;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 3px;
      padding: 0.85rem 1rem;
      color: #f0ede6;
      font-family: 'Syne', sans-serif;
      font-size: 0.95rem;
      letter-spacing: 0.04em;
      outline: none;
      transition: border-color 0.25s ease;
    }

    .gate-input:focus {
      border-color: rgba(200,169,110,0.45);
    }

    .gate-input.error {
      border-color: rgba(220,80,80,0.6);
      animation: shake 0.35s ease;
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-6px); }
      40%      { transform: translateX(6px); }
      60%      { transform: translateX(-4px); }
      80%      { transform: translateX(4px); }
    }

    .gate-btn {
      margin-top: 1rem;
      width: 100%;
      padding: 0.85rem 1rem;
      background: #c8a96e;
      color: #080808;
      border: none;
      border-radius: 3px;
      font-family: 'Syne', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s ease;
    }

    .gate-btn:hover { opacity: 0.85; }
    .gate-btn:active { opacity: 0.7; }

    .gate-error {
      margin-top: 0.75rem;
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      color: rgba(220,80,80,0.8);
      text-transform: uppercase;
      min-height: 1em;
    }

    /* ── embed ── */
    #embed {
      position: fixed;
      inset: 0;
      opacity: 0;
      transition: opacity 0.5s ease 0.1s;
      pointer-events: none;
    }

    #embed.visible {
      opacity: 1;
      pointer-events: auto;
    }

    iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

  <div id="gate">
    <div class="gate-box">
      <div class="gate-logo">dot<span>.</span>portfolio</div>
      <div class="gate-label">Password</div>
      <input
        id="pwd"
        class="gate-input"
        type="password"
        placeholder="Enter password"
        autocomplete="current-password"
      />
      <button class="gate-btn" onclick="unlock()">Access Presentation</button>
      <div class="gate-error" id="err"></div>
    </div>
  </div>

  <div id="embed">
    <iframe
      loading="lazy"
      src="https://www.canva.com/design/DAGy9vbfToY/mrR1VFyYfPGp2s0z8tqmOQ/view?embed"
      allowfullscreen="allowfullscreen"
      allow="fullscreen"
    ></iframe>
  </div>

  <script>
    const PASS = 'DoT!@3@2026';

    // stay unlocked for the session
    if (sessionStorage.getItem('telco_auth') === '1') show();

    document.getElementById('pwd').addEventListener('keydown', e => {
      if (e.key === 'Enter') unlock();
    });

    function unlock() {
      const val = document.getElementById('pwd').value;
      if (val === PASS) {
        sessionStorage.setItem('telco_auth', '1');
        show();
      } else {
        const input = document.getElementById('pwd');
        const err   = document.getElementById('err');
        input.classList.remove('error');
        void input.offsetWidth;
        input.classList.add('error');
        err.textContent = 'Incorrect password';
        input.value = '';
      }
    }

    function show() {
      document.getElementById('gate').classList.add('hidden');
      document.getElementById('embed').classList.add('visible');
    }
  </script>

</body>
</html>
